<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Road Sign Practice</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./firebase-config.js"></script>
  <script src="./app.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand-row">
        <div class="brand-mark">RS</div>
        <div class="brand-copy">
          <h1>Road Sign Practice</h1>
          <p id="bank-count">Loading...</p>
        </div>
      </div>

      <section class="profile-panel" aria-label="Profile">
        <div class="profile-main">
          <img id="profile-photo" alt="" class="profile-photo" hidden>
          <div class="profile-initials" id="profile-initials">G</div>
          <div class="profile-copy">
            <div class="profile-name" id="profile-name">Guest profile</div>
            <div class="profile-email" id="profile-email">Progress stays on this device</div>
          </div>
        </div>
        <button type="button" class="auth-button" id="auth-button">Sign in</button>
      </section>

      <section class="stats-grid" aria-label="Practice stats">
        <div class="stat-card">
          <span>Correct</span>
          <strong id="stat-correct">0</strong>
        </div>
        <div class="stat-card">
          <span>Wrong</span>
          <strong id="stat-wrong">0</strong>
        </div>
        <div class="stat-card">
          <span>Accuracy</span>
          <strong id="stat-accuracy">0%</strong>
        </div>
      </section>
    </header>

    <nav class="mode-nav" aria-label="Practice mode">
      <button type="button" data-mode="random" class="active">Random</button>
      <button type="button" data-mode="questionnaire">Sets</button>
      <button type="button" data-mode="mistakes">Mistakes</button>
    </nav>

    <main class="main-layout">
      <aside class="session-panel">
        <div class="session-title">
          <span id="mode-label">Random</span>
          <strong id="position-label">0 / 0</strong>
        </div>

        <div id="questionnaire-controls" class="questionnaire-controls" hidden>
          <label>
            <span>PDF</span>
            <select id="test-select"></select>
          </label>
          <label>
            <span>Questionnaire</span>
            <select id="set-select"></select>
          </label>
        </div>

        <button type="button" class="primary-button" id="start-button">Start</button>
        <p class="session-note" id="status-label"></p>
      </aside>

      <section class="practice-card" id="question-view">
        <div class="question-top">
          <div>
            <p class="question-kicker" id="question-meta">Question</p>
            <h2 id="question-title">Loading question</h2>
          </div>
        </div>

        <div class="image-stage">
          <img id="question-image" alt="Road sign question from the PDF">
        </div>

        <form class="answer-grid" id="answer-form">
          <label class="answer-option">
            <input type="radio" name="answer" value="1">
            <span>1</span>
          </label>
          <label class="answer-option">
            <input type="radio" name="answer" value="2">
            <span>2</span>
          </label>
          <label class="answer-option">
            <input type="radio" name="answer" value="3">
            <span>3</span>
          </label>
        </form>

        <div class="feedback" id="feedback" hidden></div>

        <div class="action-bar">
          <button type="button" id="submit-button" class="primary-button" disabled>Submit</button>
          <button type="button" id="next-button" disabled>Next</button>
        </div>
      </section>

      <section class="empty-state" id="empty-view" hidden>
        <div>
          <h2 id="empty-title">Ready</h2>
          <p id="empty-message">Start a practice session.</p>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
